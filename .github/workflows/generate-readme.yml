name: Generate Project README & Publish

on:
  push:
    branches: [main]
    paths:
      - 'readme.source.md'
      - 'src/**'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies & build
        run: |
          npm ci
          npm run build

      - name: Generate README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node dist/cli.js build --assets .github/assets

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain README.md .github/assets)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version, commit & publish
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")

          git add README.md .github/assets package.json package-lock.json
          git commit -m "release v${VERSION} via readme-aura"

          git push origin HEAD:${GITHUB_REF_NAME}

          npm publish --provenance

          COMMIT_SHA=$(git rev-parse HEAD)

          gh release create "v${VERSION}" --target $COMMIT_SHA --title "Release v${VERSION}" --generate-notes
